name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          mkdir -p release

          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o release/klax-${{ github.ref_name }}-linux-amd64 ./cmd/klax
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o release/klax-${{ github.ref_name }}-linux-arm64 ./cmd/klax

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/*

<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>__KLAX_UI_TITLE__</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%231ec21e'/><stop offset='0.5' stop-color='%2300b500'/><stop offset='1' stop-color='%23008e00'/></linearGradient></defs><rect x='1.25' y='1.25' width='29.5' height='29.5' rx='8' fill='url(%23g)' stroke='%23006400' stroke-width='0.8'/><text x='16' y='23' font-family='ui-monospace,monospace' font-size='21' font-weight='bold' fill='%23ffffff' text-anchor='middle'>k</text></svg>">
<style>

  /* Light theme (default) */
  :root {
    --bg:#ffffff; --panel:#f5f6f8; --chat:#e6e8ec; --fg:#1f2328; --muted:#6b7280; --border:#e3e5ea;
    --bubble-user:#dcf3dc; --bubble-assistant:#ffffff; --tool-bg:#eef0f3; --tool-fg:#4b5563;
    --code-bg:#eceef1; --error-bg:#fdecea; --error-fg:#b3261e; --accent:#008e00;
    --dot:#9fb6a6; --dot-work:#6db33a; --dot-new:#1ec21e; --unread-bg:#e2f6e2; --warn:#d9a441;
    --link:#006400;
    --tab-active-bg:#ffffff; --tab-active-border:#006400;
  }
  html[data-theme="dark"] {
    --bg:#15171c; --panel:#1a1d23; --chat:#15171c; --fg:#d8dee9; --muted:#8b92a0; --border:#2a2e37;
    --bubble-user:#24382a; --bubble-assistant:#232730; --tool-bg:#1c1f26; --tool-fg:#9aa4b6;
    --code-bg:#14161b; --error-bg:#3a2326; --error-fg:#f0b3b3; --accent:#33c558;
    --dot:#49584d; --dot-work:#9ccc65; --dot-new:#2bd02b; --unread-bg:#1f3324; --warn:#d9a441;
    --link:#9ccc65;
    --tab-active-bg:#232730; --tab-active-border:#33c558;
  }
  * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--muted) transparent; }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background-color: var(--muted); border-radius: 6px;
                              border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background-color: var(--fg); }
  body { margin: 0; font: 14px/1.5 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif, "klax-emoji", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
         background: var(--bg); color: var(--fg); height: 100vh; height: 100dvh;
         display: flex; flex-direction: column; }
  a { color: var(--link); text-decoration-color: color-mix(in srgb, var(--link) 65%, transparent); }
  a:hover { color: var(--accent); text-decoration-color: currentColor; }
  #gate { margin: auto; max-width: 360px; padding: 24px; text-align: center; }
  #gate input { width: 100%; padding: 10px; margin: 12px 0; border-radius: 8px;
                border: 1px solid var(--border); background: var(--panel); color: var(--fg); }
  button { cursor: pointer; border: 1px solid var(--border); background: var(--panel); color: var(--fg);
           border-radius: 8px; padding: 8px 12px; }
  button:hover { border-color: var(--accent); }
  #app { display: none; flex-direction: column; flex: 1; min-height: 0; }
  #app.active { display: flex; }

  /* Single top panel: tabs + controls */
  #bar { display: flex; align-items: center; gap: 8px; padding: 6px 8px;
         background: var(--panel); border-bottom: 1px solid var(--border); }
  #bar .logo { flex: none; display: block; filter: drop-shadow(0 1px 1px rgba(0,0,0,.14)); }
  #tabs { display: flex; gap: 4px; overflow-x: auto; flex: 1; min-width: 0; }
  #bar > button { flex: none; padding: 4px 10px; font-size: 15px; line-height: 1; }
  .tab { padding: 6px 12px; border-radius: 8px; white-space: nowrap; cursor: pointer;
         border: 1px solid transparent; display: flex; align-items: center; gap: 6px; }
  .tab.active {
    background: var(--tab-active-bg);
    border-color: var(--tab-active-border);
  }
  .tab.active .dot { background: var(--accent); }
  .tab .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dot); }
  .tab.busy .dot { background: var(--dot-work); animation: pulse 1s infinite; } /* working: pulsing lime */
  @keyframes pulse { 50% { opacity: .35; } }
  .tab.unread { font-weight: 600; background: var(--unread-bg); }              /* finished w/ new msgs */
  .tab.unread:not(.busy) .dot { background: var(--dot-new); }                  /* solid bright green */
  /* Unread count — a mini of the favicon: rounded-square green chip, count instead of "k". */
  .tab .badge { background: linear-gradient(#1ec21e, #00b500 50%, #008e00); color: #fff; font-size: 11px;
                font-weight: 700; line-height: 1; min-width: 17px; height: 17px; padding: 0 4px;
                border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; }
  .tab .queued { font-size: 11px; color: var(--muted); }
  .qnote { margin-left: 10px; font-size: 12px; color: var(--muted); }
  .tab .tname { overflow: hidden; text-overflow: ellipsis; max-width: 22ch; }
  .tab .tx { margin-left: 2px; color: var(--muted); opacity: 0; font-size: 12px; cursor: pointer; }
  .tab:hover .tx, .tab.active .tx { opacity: .65; }
  .tab .tx:hover { opacity: 1; color: var(--error-fg); }
  .stop { margin-left: 10px; padding: 2px 8px; font-size: 12px; border-radius: 6px; cursor: pointer;
          background: var(--error-bg); color: var(--error-fg); border: 1px solid var(--border); }

  /* Centred conversation column — on wide desktop the chat does not span the
     whole screen, so left (klax) and right (user) messages stay close. */
  #logwrap { flex: 1; min-height: 0; position: relative; display: flex; }
  #log { flex: 1; overflow-y: auto; scrollbar-gutter: stable both-edges;
         display: flex; flex-direction: column; align-items: center; background: var(--chat); }
  #logcol { width: 100%; max-width: 820px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { position: relative; padding: 8px 12px; border-radius: 10px; word-wrap: break-word; }
  .readline { display: flex; align-items: center; gap: 8px; align-self: stretch; color: var(--accent); font-size: 11px; opacity: .9; }
  .readline::before, .readline::after { content: ""; flex: 1; height: 1px; background: var(--accent); opacity: .45; }
  /* klax-side blocks fill the column for a consistent width — only the colour
     differs between text, tool, error and command output. */
  .msg.assistant, .msg.tool, .msg.error, .msg.notice { align-self: stretch; }
  .msg.user { align-self: flex-end; max-width: 85%; background: var(--bubble-user); }
  .msg.assistant { background: var(--bubble-assistant); }
  .msg.system { align-self: center; font-size: 12px; color: var(--muted); background: transparent; }
  .msg.tool { font-family: ui-monospace, monospace; font-size: 12px; color: var(--tool-fg); background: var(--tool-bg); }
  .msg.error { background: var(--error-bg); color: var(--error-fg); }
  .msg.notice { background: var(--tool-bg); color: var(--fg); font-size: 12px; }
  /* typing indicator (work-in-progress marker, like Telegram's "...") */
  .msg.typing { align-self: flex-start; width: fit-content; padding: 12px 14px; }
  .dots { display: inline-flex; gap: 5px; align-items: center; }
  .dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
               animation: blink 1.2s infinite both; }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }

  /* Every block is separated by exactly one line — consistent everywhere, so
     headings clearly stand out without leaving oversized gaps. */
  .body p, .body h1, .body h2, .body h3, .body h4, .body h5, .body h6,
  .body ul, .body ol, .body pre, .body blockquote, .body table, .body hr { margin: 1.5em 0; }
  .body > :first-child { margin-top: 0; }
  .body > :last-child { margin-bottom: 0; }
  .body h1, .body h2, .body h3, .body h4, .body h5, .body h6 { font-weight: 700; line-height: 1.3; }
  .body h1 { font-size: 1.3em; } .body h2 { font-size: 1.18em; } .body h3 { font-size: 1.05em; }
  .body h4, .body h5, .body h6 { font-size: 1em; }
  .body ul, .body ol { padding-left: 1.5em; }
  .body li { margin: .2em 0; }
  .body li > ul, .body li > ol { margin: .2em 0; }
  .body blockquote { border-left: 3px solid var(--accent); padding: 0 0 0 .9em; color: var(--muted); }
  .body table { border-collapse: collapse; display: block; overflow-x: auto; max-width: 100%; font-size: .95em; }
  .body th, .body td { border: 1px solid var(--border); padding: 4px 9px; }
  .body th { background: var(--tool-bg); font-weight: 700; }
  .body hr { border: none; border-top: 1px solid var(--border); }
  .body s { opacity: .65; }
  .body pre { position: relative; background: var(--code-bg); padding: 8px; border-radius: 6px; overflow-x: auto; }
  .body pre .copy { position: absolute; top: 6px; right: 6px; padding: 2px 7px; font-size: 12px; line-height: 1;
                    border: 1px solid var(--border); border-radius: 5px; background: var(--bg); color: var(--muted);
                    cursor: pointer; opacity: 0; transition: opacity .12s; user-select: none; }
  .body pre:hover .copy { opacity: .7; }
  .body pre .copy:hover { opacity: 1; color: var(--fg); }
  .body pre .copy.done { opacity: 1; color: #fff; background: var(--accent); border-color: var(--accent); }
  .body code { background: var(--code-bg); padding: 1px 4px; border-radius: 4px; }
  .body pre code { background: none; padding: 0; }
  /* GitHub-markdown reading font for conversation prose (assistant + user only) —
     tabs, composer, tool labels and notices keep the compact UI font. */
  .msg.assistant .body, .msg.user .body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "klax-emoji", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
    font-size: 16px;
  }
  .msg.assistant .body code, .msg.assistant .body pre,
  .msg.user .body code, .msg.user .body pre {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }

  /* cmon-style timestamp: subtle, top-right, revealed on hover */
  .meta { position: absolute; top: 2px; right: 6px; font-size: 11px; color: var(--muted);
          opacity: 0; transition: opacity .15s; pointer-events: none; white-space: nowrap;
          background: var(--panel); padding: 0 4px; border-radius: 4px; }
  .msg:hover .meta { opacity: 1; }
  #more { align-self: center; font-size: 12px; }

  #tobottom { position: absolute; right: 16px; bottom: 14px; width: 32px; height: 32px;
              border-radius: 50%; padding: 0; border: none; cursor: pointer;
              display: flex; align-items: center; justify-content: center;
              box-shadow: 0 2px 8px rgba(0,0,0,.3); background: #6b7280; color: #fff; }
  #tobottom:hover { filter: brightness(1.08); }
  #tobottom svg { display: block; }
  #composer { display: flex; justify-content: center; padding: 10px 16px;
              border-top: 1px solid var(--border); background: var(--panel); }
  #cbar { position: relative; width: 100%; max-width: 788px; }
  #cbar textarea { display: block; width: 100%; resize: none; min-height: 44px; max-height: 240px; height: 44px;
                   padding: 11px 48px 11px 14px; border-radius: 12px; border: 1px solid var(--border);
                   background: var(--bg); color: var(--fg); font: inherit; line-height: 1.4;
                   overflow-y: auto; scrollbar-width: none; }
  #cbar textarea::-webkit-scrollbar { display: none; }
  #cbar .send { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px;
                padding: 0; border: none; border-radius: 50%; background: var(--accent); color: #fff; cursor: pointer;
                display: flex; align-items: center; justify-content: center; }
  #cbar .send:hover { filter: brightness(1.08); }
  #cbar .send svg { display: block; }
  #notice { position: fixed; bottom: 84px; right: 16px; max-width: 40ch;
            background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
            font-size: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.25);
            opacity: 0; transition: opacity .2s; pointer-events: none; }
  #notice.show { opacity: 1; }
  /* custom dialog (replaces system confirm/prompt, keeps the UI style) */
  #modal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
           background: rgba(0,0,0,.45); }
  .modal-box { width: 340px; max-width: 90vw; background: var(--bg); color: var(--fg);
               border: 1px solid var(--border); border-radius: 12px; padding: 18px;
               box-shadow: 0 12px 44px rgba(0,0,0,.35); }
  .modal-msg { margin-bottom: 12px; }
  .modal-input { width: 100%; padding: 9px 11px; margin-bottom: 14px; border-radius: 8px;
                 border: 1px solid var(--border); background: var(--panel); color: var(--fg); font: inherit; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button { padding: 7px 16px; }
  .modal-ok { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-ok.danger { background: #d92d20; border-color: #d92d20; }
  /* per-session settings dialog (double-click a tab) */
  #smodal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,.45); }
  .smodal-box { width: 430px; max-width: 92vw; background: var(--bg); color: var(--fg);
                border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px 18px;
                box-shadow: 0 12px 44px rgba(0,0,0,.35); }
  .smodal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .smodal-title { font-weight: 600; font-size: 15px; }
  .smodal-x { background: none; border: none; color: var(--muted); font-size: 15px; cursor: pointer;
              line-height: 1; padding: 2px 6px; border-radius: 6px; }
  .smodal-x:hover { color: var(--error-fg); }
  .srow { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 32px; margin-bottom: 8px; }
  .srow > label { color: var(--muted); font-size: 13px; flex: none; }
  .srow .sctl { flex: 1; display: flex; justify-content: flex-end; }
  .srow select, .sname { width: 240px; max-width: 100%; padding: 7px 9px; border-radius: 8px;
               border: 1px solid var(--border); background: var(--panel); color: var(--fg); font: inherit; }
  .srow select:disabled, .sname:disabled, .stoggle input:disabled { opacity: .45; cursor: not-allowed; }
  .stoggle { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; font-size: 13px; }
  .stoggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .shint { color: var(--muted); font-size: 11px; margin: 0 0 8px; }
  .sfield { margin-bottom: 10px; }
  .sfield > label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 5px; }
  .sfield input, .sfield textarea { width: 100%; padding: 7px 9px; border-radius: 8px;
                 border: 1px solid var(--border); background: var(--panel); color: var(--fg); font: inherit; }
  .sfield textarea { resize: vertical; min-height: 38px; line-height: 1.4; }
  .sfield input:disabled, .sfield textarea:disabled { opacity: .45; cursor: not-allowed; }
  .sbusy { background: var(--tool-bg); color: var(--tool-fg); border-radius: 8px; padding: 7px 10px;
           font-size: 12px; margin-bottom: 12px; }
  .ssep { height: 1px; background: var(--border); margin: 12px 0; opacity: .6; }
  .sctx-label { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .sctx-bar { height: 7px; border-radius: 4px; background: var(--tool-bg); overflow: hidden; }
  .sctx-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .25s; }
  .sctx-fill.hot { background: var(--warn); }
  .sctx-fill.crit { background: var(--error-fg); }
  .smodal-actions { display: flex; justify-content: flex-end; margin-top: 14px; }
  .smodal-ok { min-width: 76px; background: var(--accent); color: #fff; border-color: var(--accent); }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="gate">
  <h2>__KLAX_UI_TITLE__</h2>
  <p>Введите токен доступа</p>
  <input id="token" type="password" placeholder="ui_token" autocomplete="off">
  <button onclick="saveToken()">Войти</button>
</div>

<div id="app">
  <div id="bar">
    <svg class="logo" viewBox="0 0 32 32" width="26" height="26" aria-label="klax"><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1ec21e"/><stop offset="0.5" stop-color="#00b500"/><stop offset="1" stop-color="#008e00"/></linearGradient></defs><rect x="1.25" y="1.25" width="29.5" height="29.5" rx="8" fill="url(#lg)" stroke="#006400" stroke-width="0.8"/><text x="16" y="23" font-family="ui-monospace,monospace" font-size="21" font-weight="bold" fill="#ffffff" text-anchor="middle">k</text></svg>
    <div id="tabs"></div>
    <button class="new" onclick="newSession()" title="Новая сессия">+</button>
    <button id="theme" onclick="toggleTheme()" title="Тема">🌙</button>
  </div>
  <div id="logwrap">
    <div id="log"><div id="logcol"></div></div>
    <button id="tobottom" class="hidden" onclick="scrollBottom()" title="Вниз" aria-label="Вниз"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M6 13l6 6 6-6"/></svg></button>
  </div>
  <div id="composer">
    <div id="cbar">
      <textarea id="input" rows="1" placeholder="Сообщение…"></textarea>
      <button class="send" onclick="send()" title="Отправить" aria-label="Отправить"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg></button>
    </div>
  </div>
</div>
<div id="notice"></div>
<div id="modal" class="hidden">
  <div class="modal-box">
    <div class="modal-msg"></div>
    <input class="modal-input hidden" type="text" autocomplete="off">
    <div class="modal-actions">
      <button class="modal-cancel">Отмена</button>
      <button class="modal-ok">OK</button>
    </div>
  </div>
</div>
<div id="smodal" class="hidden">
  <div class="smodal-box">
    <div class="smodal-head">
      <span class="smodal-title">Настройки сессии</span>
      <button class="smodal-x" onclick="closeSettings()" title="Закрыть">✕</button>
    </div>
    <div id="sbody"></div>
    <div class="smodal-actions"><button class="smodal-ok" onclick="closeSettings()">OK</button></div>
  </div>
</div>

<script>
const TOKEN_KEY = "klax_ui_token", THEME_KEY = "klax_theme2"; // bumped: ignore the old auto-persisted theme so the default is light
// Mount-path aware base so the SPA works behind a path-stripping reverse proxy
// (e.g. Caddy `uri strip_prefix /klax`): every API/SSE URL is built relative to
// where the page is served, not the origin root — "/" for direct access,
// "/klax/" when mounted under /klax, with or without a trailing slash.
const BASE = location.pathname.endsWith("/") ? location.pathname : location.pathname + "/";
// Bundled color-emoji web font: inject @font-face at runtime with the mount-aware

// Inline-level Markdown applied to a single line (escapes first, then a safe set).
function inline(s){
  // Split into `code` spans vs the rest and transform only the rest, so a *, [
  // or | inside code stays literal — and there is no placeholder string that
  // could collide with user text. _underscore_ emphasis is intentionally
  // unsupported (snake_case / file_paths fill this tool's output).
  return (s||"").split(/(`[^`]+`)/g).map(seg => {
    if(seg.length >= 2 && seg[0] === "`" && seg[seg.length-1] === "`") return '<code>'+esc(seg.slice(1, -1))+'</code>';
    let h = esc(seg);
    // Cheap indexOf gate before each regex: when the trigger substring is absent
    // the pattern can't match, so skipping avoids the engine scanning (and, for
    // the link regex on bracket-heavy text with no "](", backtracking O(n^2) per
    // unmatched "[" — enough to freeze the tab on a big array/log dump).
    if(h.indexOf("**") !== -1) h = h.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
    if(h.indexOf("~~") !== -1) h = h.replace(/~~([^~]+)~~/g, '<s>$1</s>');
    if(h.indexOf("*")  !== -1) h = h.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<i>$2</i>'); // *italic*, never part of **bold**
    if(h.indexOf("](") !== -1) h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    return linkifyBare(h);
  }).join("");
}

// Turn bare http(s) URLs into links, leaving existing <a>/<code> spans untouched.
// Safe: h is already escaped, so a URL match holds no raw <, >, or " (it can't break
// out of the href attribute or inject markup); only https?:// matches, so javascript:
// URLs are excluded.
function linkifyBare(h){
  return h.replace(/(<a\b[^>]*>[\s\S]*?<\/a>|<code>[\s\S]*?<\/code>)|(https?:\/\/[^\s<]+)/g, function(m, span, url){
    if(span) return span;
    var u = url, tail = "";
    var p = u.match(/[.,;:!?]+$/);             // don't swallow trailing sentence punctuation
    if(p){ tail = p[0]; u = u.slice(0, -p[0].length); }
    var opens = 0, closes = 0;                 // count parens once (O(n)), then trim trailing UNbalanced ")"
    for(var k = 0; k < u.length; k++){ var c = u[k]; if(c === "(") opens++; else if(c === ")") closes++; }
    var t = 0; while(t < u.length && u[u.length-1-t] === ")") t++;
    var strip = Math.min(t, closes - opens);
    if(strip > 0){ tail = u.slice(u.length - strip) + tail; u = u.slice(0, u.length - strip); }
    return '<a href="' + u + '" target="_blank" rel="noopener">' + u + '</a>' + tail;
  });

// Split a table row into trimmed cells on top-level pipes only: a \| escape or a
// pipe inside a `code` span stays in its cell instead of tearing it in half.
function splitRow(line){
  const s = line.trim(), cells = [];
  let cur = "", code = false;
  for(let i = 0; i < s.length; i++){
    const ch = s[i];
    if(ch === "`"){ code = !code; cur += ch; }
    else if(ch === "\\" && s[i+1] === "|"){ cur += "|"; i++; }
    else if(ch === "|" && !code){ cells.push(cur.trim()); cur = ""; }
    else cur += ch;
  }
  cells.push(cur.trim());
  if(cells.length && cells[0] === "") cells.shift();            // drop optional leading border pipe
  if(cells.length && cells[cells.length-1] === "") cells.pop(); // and trailing
  return cells;
}

// Render a pipe table. aligns[i] is ""|"left"|"center"|"right" (from our own
// parse of the :---: separator), so it is safe to drop into a style attribute.
function renderTable(header, aligns, rows){
  const cell = (tag, c, i) => '<'+tag+(aligns[i] ? ' style="text-align:'+aligns[i]+'"' : '')+'>'+inline(c||"")+'</'+tag+'>';
  const head = '<tr>'+header.map((c,i)=>cell("th",c,i)).join("")+'</tr>';
  const body = rows.map(r => '<tr>'+header.map((_,i)=>cell("td",r[i],i)).join("")+'</tr>').join("");
  return '<table><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';

// Render a list region (consecutive list-item lines) into nested <ul>/<ol> by
// indentation, via an explicit stack of open levels. A deeper indent opens a
// new list inside the still-open <li>; a shallower one closes levels back down.

    const m = raw.match(/^(\s*)(?:([-*+])|(\d+)[.)])\s+(.*)$/);

        const inner = q.join("\n");
        // Cap nesting so a paste of thousands of leading '>' can't overflow the stack.
        html += '<blockquote>'+(depth < 8 ? md(inner, depth+1) : '<p>'+esc(inner)+'</p>')+'</blockquote>';
        continue;
      }
      // Pipe table: a row with '|' immediately followed by a :---: separator row
      if(line.indexOf("|") !== -1 && i+1 < lines.length &&
         /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)+\|?\s*$/.test(lines[i+1])){
        flush();
        const header = splitRow(line);
        const aligns = splitRow(lines[i+1]).map(c => {
          const l = c.startsWith(":"), r = c.endsWith(":");
          return l && r ? "center" : r ? "right" : l ? "left" : "";
        });
        i += 2;
        const rows = [];
        while(i < lines.length && lines[i].trim() !== "" && lines[i].indexOf("|") !== -1){ rows.push(splitRow(lines[i])); i++; }
        i--;
        html += renderTable(header, aligns, rows);
        continue;
      }
      // List region (ordered or unordered, possibly nested)
      if(/^\s*([-*+]|\d+[.)])\s+/.test(line)){
        flush();
        const items = [];
        while(i < lines.length){
          if(/^\s*([-*+]|\d+[.)])\s+/.test(lines[i])){ items.push(lines[i]); i++; }
          else if(lines[i].trim() === "" && i+1 < lines.length && /^\s*([-*+]|\d+[.)])\s+/.test(lines[i+1])){ i++; } // loose list: absorb a single blank line between items
          else break;
        }
        i--;
        html += renderList(items);
        continue;
      }
      para.push(line);
    }
    flush();
  });
  return html;
}

// mdSafe wraps md() so a malformed/pathological block can never throw out of an
// event handler (which would strand the typing indicator and lose the answer —
// see applyEvent). On failure it degrades to escaped plain text with line breaks
// rather than dropping the content. ALL live/history render paths use this, not
// md() directly.
function mdSafe(src){
  try { return md(src); }
  catch(e){ console.error("klax md()", e); return esc(src).replace(/\n/g, "<br>"); }
}

function api(path, opts){
  opts = opts || {};
  opts.headers = Object.assign({ "Authorization": "Bearer "+token }, opts.headers||{});
  return fetch(BASE + (path[0] === "/" ? path.slice(1) : path), opts);
}

function saveToken(){
  token = document.getElementById("token").value.trim();
  if(!token) return;
  localStorage.setItem(TOKEN_KEY, token);
  start();
}

function showNotice(text){
  const n = document.getElementById("notice");
  n.textContent = text; n.classList.add("show");
  clearTimeout(n._t); n._t = setTimeout(() => n.classList.remove("show"), 4000);
}

// Themed modal dialog (replaces system confirm/prompt). Resolves to false/null on
// cancel; to true (confirm) or the entered string (prompt) on OK.
function showModal(opts){
  return new Promise(resolve => {
    const m = document.getElementById("modal");
    const inp = m.querySelector(".modal-input");
    const ok = m.querySelector(".modal-ok");
    const cancel = m.querySelector(".modal-cancel");
    m.querySelector(".modal-msg").textContent = opts.message || "";
    if(opts.input){ inp.classList.remove("hidden"); inp.value = opts.value || ""; }
    else inp.classList.add("hidden");
    ok.textContent = opts.okText || "OK";
    ok.classList.toggle("danger", !!opts.danger);
    m.classList.remove("hidden");
    setTimeout(() => { if(opts.input){ inp.focus(); inp.select(); } else ok.focus(); }, 0);
    function done(result){
      m.classList.add("hidden");
      ok.onclick = cancel.onclick = m.onclick = null;
      document.removeEventListener("keydown", onKey, true);
      resolve(result);
    }
    function onKey(e){
      if(e.key === "Escape"){ e.preventDefault(); done(opts.input ? null : false); }
      else if(opts.input && e.key === "Enter" && e.target === inp){ e.preventDefault(); done(inp.value); }
    }
    ok.onclick = () => done(opts.input ? inp.value : true);
    cancel.onclick = () => done(opts.input ? null : false);
    m.onclick = (e) => { if(e.target === m) done(opts.input ? null : false); };
    document.addEventListener("keydown", onKey, true);
  });
}
function uiConfirm(message, okText, danger){ return showModal({ message, okText, danger }); }
function uiPrompt(message, value){ return showModal({ message, input: true, value }); }

function renderTabs(){
  const el = document.getElementById("tabs");
  el.innerHTML = "";
  let totalUnread = 0;
  sessions.forEach(s => {
    const t = document.createElement("div");
    const total = (logs[s.created]||[]).length;
    if(s.created===active && !viewing(s.created) && readMark[s.created] === undefined) readMark[s.created] = total;
    const n = viewing(s.created) ? 0 : Math.max(0, total - (readMark[s.created]||0)); // new blocks since last viewed
    totalUnread += n;
    const q = s.queued || 0;
    t.className = "tab" + (s.created===active?" active":"") + (busy.has(s.created)?" busy":"") + (n>0?" unread":"");
    t.onclick = () => selectTab(s.created);
    t.ondblclick = () => openSettings(s.created);
    t.innerHTML = '<span class="dot"></span><span class="tname">' + esc(s.name || ("#"+s.created)) + '</span>'
                + (q>0 ? '<span class="queued">⏳'+q+'</span>' : "")
                + (n>0 ? '<span class="badge">'+n+'</span>' : "")
                + '<span class="tx" title="Закрыть">✕</span>';
    t.querySelector(".tx").onclick = (e) => { e.stopPropagation(); closeSession(s.created, s.name); };
    el.appendChild(t);
  });
  const busyCount = sessions.reduce((n, s) => n + (busy.has(s.created) ? 1 : 0), 0);
  const mark = (totalUnread > 0 ? String(totalUnread) : "") + "*".repeat(busyCount);
  document.title = mark ? "(" + mark + ") " + BASE_TITLE : BASE_TITLE;
}

function entry(cls, html, unix){ return { cls, html, unix: unix||0 }; }

// Consecutive same-kind blocks collapse into one bubble: tools (one line per
// tool) and assistant text (narration + answer), matching how history shows a
// turn as a single consolidated block.
function mergeOrPush(arr, e){
  const last = arr[arr.length-1];
  if(last && last.cls === e.cls && (e.cls === "tool" || e.cls === "assistant")){
    last.html += (e.cls === "tool" ? "<br>" : "") + e.html;
    if(e.unix) last.unix = e.unix;
  } else {
    arr.push(e);
  }
}

function nearBottom(){
  const el = document.getElementById("log");
  return el.scrollHeight - el.scrollTop - el.clientHeight < 80;
}
function toggleToBottom(){
  document.getElementById("tobottom").classList.toggle("hidden", stick);
}
function scrollBottom(){
  const el = document.getElementById("log");
  el.scrollTop = el.scrollHeight;
  stick = true; toggleToBottom();
}

// True when a non-collapsed text selection lives inside the log column.
function selectionInLog(){
  const sel = window.getSelection ? window.getSelection() : null;
  if(!sel || sel.isCollapsed || sel.rangeCount === 0) return false;
  const log = document.getElementById("log");
  return !!log && (log.contains(sel.anchorNode) || log.contains(sel.focusNode));
}

// Copy to clipboard, with an execCommand fallback for non-secure contexts
// (plain-http access where navigator.clipboard is unavailable).
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText)
    return navigator.clipboard.writeText(text).then(() => true).catch(() => fallbackCopy(text));
  return Promise.resolve(fallbackCopy(text));
}
function fallbackCopy(text){
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch(e){ return false; }
}

// syncTyping toggles ONE dedicated trailing node from the authoritative busy set,
// independent of the log rebuild. This is the hard guarantee that the three-dot
// indicator matches the daemon: renderLog may defer (text selection) or a content
// render may fail, but this still adds/removes the dot to match busy.has(active).
// It touches only its own node at the end of the column, so it never collapses a
// selection elsewhere in the log.
function syncTyping(){
  const col = document.getElementById("logcol");
  if(!col) return;
  let t = document.getElementById("typing");
  if(!(busy.has(active) && document.visibilityState === "visible")){
    if(t) t.remove();
    return;
  }
  const s = sessions.find(x => x.created === active);
  const q = (s && s.queued) || 0;
  const html = '<span class="dots"><span></span><span></span><span></span></span>'
             + (q>0 ? '<span class="qnote">+'+q+' в очереди</span>' : "")
             + '<button class="stop" onclick="abortActive()" title="Прервать">✕</button>';
  if(!t){
    t = document.createElement("div");
    t.id = "typing"; t.className = "msg assistant typing";
    t.innerHTML = html;
    col.appendChild(t);
    if(stick) scrollBottom();
  } else {
    if(t.innerHTML !== html) t.innerHTML = html; // refresh the queue note in place
    if(col.lastChild !== t) col.appendChild(t);  // keep it last after content was appended
  }
}

function renderLog(){
  // Don't rebuild the log out from under an active text selection — that would
  // collapse/extend it (the "selection jumps to the top" + flicker bug). Defer
  // and flush once the selection clears (see the selectionchange handler).
  if(selectionInLog()){ pendingRender = true; return; }
  const el = document.getElementById("logcol");
  el.innerHTML = "";
  if (offset[active] > 0){
    const m = document.createElement("button");
    m.id = "more"; m.textContent = "↑ Загрузить раньше";
    m.onclick = () => loadHistory(active, offset[active]);
    el.appendChild(m);
  }
  const items = logs[active] || [];
  const mark = readMark[active];
  const showLine = (mark !== undefined && mark >= 0 && mark < items.length); // a "read up to here" divider
  let unreadLine = null;
  let prev = 0;
  items.forEach((it, idx) => {
    if(showLine && idx === mark){
      const ln = document.createElement("div");
      ln.className = "readline";
      ln.innerHTML = "<span>новые сообщения</span>";
      el.appendChild(ln);
      unreadLine = ln;
    }
    const d = document.createElement("div");
    d.className = "msg " + it.cls;
    let meta = fmtTime(it.unix);
    if(it.cls !== "user" && prev && it.unix) meta = fmtDelta(it.unix - prev) + " @ " + meta;
    if(it.unix) prev = it.unix;
    d.innerHTML = '<div class="body">'+it.html+'</div>' + (meta ? '<span class="meta">'+esc(meta)+'</span>' : "");
    el.appendChild(d);
  });
  syncTyping(); // append the typing indicator (if busy) as the column's last child
  if(jumpUnreadOnRender === active && unreadLine){
    jumpUnreadOnRender = 0;
    unreadLine.scrollIntoView({ block: "start" });
    stick = false; toggleToBottom();
  } else {
    if(stick) scrollBottom(); else toggleToBottom();
  }
}

function push(created, e){
  const arr = logs[created] = logs[created] || [];
  if(created === active && !viewing(created) && readMark[created] === undefined) readMark[created] = arr.length;
  // A new turn just started — never merge its first block onto the previous
  // turn's answer (otherwise a queued message's reply glues onto the prior final
  // and the two become indistinguishable).
  if(breakMerge[created]){ breakMerge[created] = false; arr.push(e); }
  // For a background tab, never merge the FIRST event-since-leaving into an
  // already-read last block: a merge wouldn't grow logs.length, so the unread
  // badge / read-line would miss it (e.g. an assistant-only final). Force a fresh
  // block so the new content is always counted and lands below the read-line.
  else if(!viewing(created) && readMark[created] !== undefined && arr.length === readMark[created]) arr.push(e);
  else mergeOrPush(arr, e);
  if(viewing(created)) renderLog(); else renderTabs(); // background/hidden: refresh unread badge + title
}

// A history item can carry both assistant text and tool calls — render both, so
// prose is never hidden by a co-located tool_use; tools show their rich label.
function itemToEntries(it){
  const u = it.time ? Date.parse(it.time) : 0;
  if(it.role === "user") return [entry("user", mdSafe(it.text), u)];
  if(it.role === "system" && it.kind === "compact") return [entry("system", "🗜 контекст свёрнут", u)];
  if(it.role === "system" && it.kind === "error") return [entry("error", esc(it.text||"ошибка"), u)];
  if(it.role === "assistant"){
    const out = [];
    if(it.text) out.push(entry("assistant", mdSafe(it.text), u));
    (it.tools||[]).forEach(t => out.push(entry("tool", esc(t.label||t.name), u)));
    return out;
  }
  return [entry("system", esc(it.text||""), u)];
}

function selectTab(created){
  // Mark the tab we're leaving as read up to its current end — that index becomes
  // the read-line / unread baseline for when we return to it.
  if(active && active !== created){
    tabStick[active] = stick || nearBottom();
    readMark[active] = (logs[active]||[]).length;
  }
  active = created;
  const jumpUnread = !!tabStick[created] && hasUnread(created);
  stick = !jumpUnread;
  if(jumpUnread) jumpUnreadOnRender = created;
  if(location.hash !== "#"+created) location.hash = created;
  renderTabs();
  if(!loaded[created]){ logs[created]=[]; loadHistory(created, 0); }
  else renderLog();
}

function loadHistory(created, before){
  if(loadingHist[created]){
    // Another load is in flight. A full reload (before=0) — e.g. busy->idle
    // recovery of a lost "final" — must NOT be dropped, or the recovered answer
    // is missed; queue it to run when the in-flight load finishes. Pagination
    // (before>0) is user-driven and simply retried by scrolling.
    if(!before) pendingReload[created] = true;
    return;
  }
  loadingHist[created] = true;
  const q = "session="+created + (before? "&before="+before : "");
  api("/api/transcript?"+q).then(r=>r.json()).then(data => {
    const prepend = [];
    (data.turns||[]).forEach(it => itemToEntries(it).forEach(e => mergeOrPush(prepend, e)));
    // Pagination (before>0) prepends older history. A full reload (before=0) is an
    // authoritative re-sync: when the session is idle the JSONL is complete, so
    // REPLACE the log instead of concatenating the live tail — otherwise a reload
    // racing a lagging live event renders the answer twice (stickily). While a turn
    // is in flight, keep the live tail (narration not yet written to the JSONL).
    logs[created] = before ? prepend.concat(logs[created] || [])
                  : (busy.has(created) ? prepend.concat(logs[created] || []) : prepend);
    // Older history was prepended — shift the read-line so it stays on the same item.
    if(before && readMark[created] !== undefined) readMark[created] += prepend.length;
    if(!before){
      // Re-show in-flight user messages not yet in the transcript (sent, queued, or
      // mid-turn); drop those the transcript now covers. Exact match is sufficient
      // and safe: the client sends no attachments, so an accepted message appears
      // verbatim as a user turn, and a refused send is rolled back at send time and
      // never reaches here. Match as a MULTISET — consume one transcript user-turn
      // per pending entry — so N identical pending sends clear against N turns, not
      // all off the first (a plain Set would over-clear duplicate "ok"-style sends).
      // Match on NORMALIZED text (strip CR, trim) so an invisible whitespace/CRLF
      // difference can't cause a false re-show.
      const norm = s => (s||"").replace(/\r/g, "").trim();
      const counts = {};
      (data.turns||[]).filter(it => it.role === "user").forEach(it => { const k = norm(it.text); counts[k] = (counts[k]||0) + 1; });
      // A leftover echo is only worth showing while the session genuinely has work
      // in flight (busy or queued). On an IDLE session the JSONL is complete and
      // authoritative, so an unmatched pending is stale — delivered under a skewed
      // send-time (it queued behind another turn, so its 15:54 send-time differs
      // from the transcript's record-time) or lost — and must NOT be re-rendered,
      // or it dangles at the bottom as a duplicate with the old time.
      const sess = sessions.find(s => s.created === created);
      const inFlight = busy.has(created) || (sess && sess.queued > 0);
      pending[created] = (pending[created] || []).filter(p => {
        const k = norm(p.text);
        if(counts[k] > 0){ counts[k]--; return false; }     // already in the transcript
        if(!inFlight) return false;                          // idle: transcript is complete — don't ghost a stale echo
        logs[created].push(entry("user", mdSafe(p.text), p.time));
        return true;
      });
      savePending();
    }
    // A full reload (reconnect) rebuilds logs from a fresh page — clamp a stale mark
    // so the read-line invariant (readMark <= logs.length) always holds.
    if(!before && readMark[created] !== undefined && readMark[created] > logs[created].length) readMark[created] = logs[created].length;
    offset[created] = data.more ? data.offset : 0;
    loaded[created] = true;
    if(viewing(created)) renderLog(); else renderTabs();
  }).catch(()=>{ loaded[created]=true; }).finally(()=>{
    delete loadingHist[created];
    if(pendingReload[created]){ delete pendingReload[created]; loaded[created]=false; logs[created]=[]; loadHistory(created, 0); }
  });
}

// reloadAll re-syncs content from the authoritative transcript: the active tab
// reloads now (it is on screen); other loaded tabs are invalidated so they reload
// lazily on next view. Used on a daemon restart (epoch change) or when the server
// can't replay our gap. Reloads REPLACE the log when idle (see loadHistory), so
// this is idempotent and never duplicates content.
function reloadAll(){
  if(active){ loaded[active] = false; logs[active] = []; stick = true; loadHistory(active, 0); }
  for(const k in loaded){ if(+k !== active) loaded[k] = false; }
  syncSessionsNow(); // re-sync authoritative state (busy/dot) alongside content
}

// reconcileSessions applies an authoritative session snapshot (from the SSE
// "sessions" event OR the /api/sessions busy-poll) to local state. It is the
// guarantee that a "typing" dot eventually matches the daemon: busy=true starts
// local monitoring even if turn_start was lost, and busy=false clears even if
// the terminal final/error was lost (restart, dropped SSE, proxy-held connection).
function reconcileSessions(list){
  const before = new Set(busy);            // local busy snapshot, to spot busy->idle
  const wasActiveBusy = busy.has(active);
  sessions = list || [];
  const present = new Set();
  sessions.forEach(s => {
    present.add(s.created);
    if(s.busy) busy.add(s.created);
    else busy.delete(s.created);
    // Authoritative content backstop: if a LOADED non-active tab's server message
    // count grew beyond what we've materialized (a turn ran while we weren't
    // watching it — cross-channel, queued, or during a ring-overflow gap),
    // invalidate it so it reloads fresh on next view. The active tab is covered
    // live + by replay; don't reload it here (that would flicker the normal path).
    if(seenMessages[s.created] !== undefined && s.messages > seenMessages[s.created]
       && loaded[s.created] && s.created !== active){
      loaded[s.created] = false;
    }
    seenMessages[s.created] = s.messages;
  });
  // A session the server no longer lists is likewise no longer busy.
  before.forEach(c => { if(!present.has(c)) busy.delete(c); });
  // NB: a lost "final" no longer needs a busy->idle transcript reload here — the
  // long-poll delivers everything after the cursor, and an uncoverable gap or a
  // restart triggers reloadAll(). Reloading on the busy->idle edge raced a lagging
  // live "final" and rendered the answer twice; that path is gone.
  if(!sessions.find(s=>s.created===active)){
    const want = parseInt(location.hash.slice(1));
    const a = sessions.find(s=>s.created===want) || sessions.find(s=>s.active) || sessions[0];
    if(a){ selectTab(a.created); return; }
  }
  renderTabs();
  // Re-render the log ONLY when the active tab's busy state actually flipped (to
  // add/drop the typing indicator). Rendering on every poll while merely busy
  // rebuilt the whole log every few seconds — visible flicker, and it collapsed
  // any in-progress text selection.
  if(wasActiveBusy !== busy.has(active)){
    if(viewing(active)) renderLog(); else renderTabs();
  }
  // Authoritative backstop: whatever the snapshot/poll said about the active tab,
  // make the typing dot match it now — this is what clears a dot the daemon
  // reports idle even when no busy transition was detected here.
  syncTyping();
}

// applyEvent renders ONE already-parsed event from a poll batch. Dedupe by the
// server's monotonic seq is belt-and-suspenders — the cursor advances monotonically
// so the poll never redelivers, but a retried request could. A render failure on
// one event must never break the batch (the loop's finally re-syncs the dot).
function applyEvent(d){
  if(d.seq !== undefined){ if(d.seq <= lastSeq) return; lastSeq = d.seq; }
  try {
    switch(d.type){
      case "user":
        // The user's own message, echoed by the server to every tab. Skip my own
        // (this tab already showed it optimistically); render it in any other tab.
        if(d.nonce && myNonces.has(d.nonce)){ myNonces.delete(d.nonce); break; }
        push(d.session, entry("user", mdSafe(d.text), Date.now()));
        break;
      case "sessions":
        reconcileSessions(d.sessions);
        break;
      case "turn_start":
        busy.add(d.session);
        breakMerge[d.session] = true; // new turn: its answer must not glue onto the previous one
        renderTabs();
        if(viewing(d.session)) renderLog();
        maybeRefreshSettings(d.session);
        break;
      case "progress":
        // Narration is the assistant's own text (intermediate blocks between tools)
        // — render it like the final answer (formatted bubble), not gray plain text.
        if(d.kind === "tool") push(d.session, entry("tool", esc(d.text), Date.now()));
        else push(d.session, entry("assistant", mdSafe(d.text), Date.now()));
        break;
      case "final":
        busy.delete(d.session);
        renderTabs();
        maybeRefreshSettings(d.session);
        push(d.session, entry("assistant", mdSafe(d.markdown), Date.now()));
        break;
      case "error":
        busy.delete(d.session);
        renderTabs();
        maybeRefreshSettings(d.session);
        push(d.session, entry("error", esc(d.text||"ошибка"), Date.now()));
        break;
      case "compact":
        push(d.session, entry("system", "🗜 контекст свёрнут", Date.now()));
        break;
      case "notice": {
        const t = noticeText(d.text);
        push(active, entry("notice", esc(t).replace(/\n/g, "<br>"), Date.now()));
        showNotice(t);
        break;
      }
    }
  } catch(e){
    console.error("klax applyEvent", d && d.type, e);
  }
}

// One authoritative /api/sessions fetch + reconcile (cold start, on focus, on
// reload). Bounded so a proxy-stalled request can't pile up.
function syncSessionsNow(){
  const ac = new AbortController();
  const t = setTimeout(() => ac.abort(), 8000);
  api("/api/sessions", { signal: ac.signal }).then(r => r.ok ? r.json() : null).then(list => {
    if(list) reconcileSessions(list);
  }).catch(()=>{}).finally(() => clearTimeout(t));
}

const POLL_ABORT_MS = 30000; // > server hold (~25s); bounds a wedged request
function pollSleep(ms){ return new Promise(res => setTimeout(res, ms)); }
function pollDelay(){ pollBackoff = pollBackoff ? Math.min(pollBackoff * 2, 5000) : 500; return pollBackoff + Math.random()*250; }

// pollLoop is the entire live channel: ask /api/poll for everything after `cursor`,
// apply the batch, advance the cursor, repeat. The server holds the request ~25s
// when idle (≈1 request / 25s — no spam, zero event latency). A failed poll just
// retries the SAME cursor (idempotent — the ring still holds everything after it,
// or returns reload). Epoch change (restart) / reload re-syncs from the transcript.
// No EventSource, heartbeat, watchdog or busy-poll timer — this is all of it.
async function pollLoop(){
  if(polling) return;
  polling = true;
  while(polling){
    let d;
    try {
      const ac = new AbortController();
      const t = setTimeout(() => ac.abort(), POLL_ABORT_MS);
      let r;
      try {
        r = await api("/api/poll" + (cursor ? "?cursor="+encodeURIComponent(cursor) : ""),
                      { signal: ac.signal, cache: "no-store" });
      } finally { clearTimeout(t); }
      if(r.status === 401){ polling = false; document.getElementById("app").classList.remove("active"); document.getElementById("gate").classList.remove("hidden"); return; }
      if(!r.ok){ await pollSleep(pollDelay()); continue; }   // 429 / 5xx → backoff, same cursor
      d = await r.json();
    } catch(e){ await pollSleep(pollDelay()); continue; }     // network / abort → backoff, same cursor
    pollBackoff = 0; // success
    try {
      const ep = (d.cursor || "").split("-")[0]; // epoch from the cursor STRING (int64 in JSON would lose precision)
      if(pollEpoch && ep && ep !== pollEpoch){    // daemon restarted (seq counter reset)
        pollEpoch = ep; cursor = d.cursor; lastSeq = -1;
        showNotice("klax обновился"); reloadAll();
        continue;
      }
      if(ep) pollEpoch = ep;
      if(d.reload){ cursor = d.cursor; reloadAll(); continue; } // uncoverable gap → re-sync from transcript
      (d.events || []).forEach(applyEvent);
      cursor = d.cursor; // commit the cursor only AFTER applying the whole batch
    } catch(e){ console.error("klax poll batch", e); }
    finally { syncTyping(); } // dot always reflects the authoritative busy set
  }
}

function autoGrow(){
  const ta = document.getElementById("input");
  ta.style.height = "auto";
  // +2 compensates the 1px top/bottom border (box-sizing:border-box) so the box
  // fits the content exactly and no spurious scrollbar appears.
  ta.style.height = Math.min(ta.scrollHeight + 2, 240) + "px";
}

function send(){
  const ta = document.getElementById("input");
  const text = ta.value.trim();
  if(!text) return;
  if(!active){ showNotice("нет выбранной вкладки"); return; }
  ta.value = "";
  ta.style.height = "";
  const now = Date.now(), target = active;
  // Sending is a definitive "caught up" signal for the active tab — drop the
  // stale "new messages" divider so the user's own message never lands beneath it.
  delete readMark[target];
  push(target, entry("user", mdSafe(text), now));
  (pending[target] = pending[target] || []).push({ text, time: now });
  savePending();
  // Nonce so we skip the server's echo of THIS message (other tabs render it).
  const nonce = SENDTAB + "-" + (++nonceCtr);
  myNonces.add(nonce);
  api("/api/send", { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ session: target, text, nonce }) })
    .then(r => {
      // A definitive refusal (e.g. 503 while klax drains for a restart) means the
      // turn was NOT accepted — roll it back AND restore the text to the composer so
      // it isn't lost (only if the user hasn't already started typing something new).
      if(!r.ok){
        rollbackSend(target, now);
        // Restore only if we're still on the tab we sent from (don't drop A's text
        // into tab B's composer) and the user hasn't started typing something new.
        if(active === target && !ta.value){ ta.value = text; autoGrow(); }
        showNotice(r.status===503 ? "klax перезапускается — текст возвращён в поле, попробуйте снова" : "ошибка отправки ("+r.status+") — текст возвращён");
      }
    })
    .catch(()=> showNotice("ошибка сети — доставка не подтверждена")); // unknown: keep pending
}

// Undo an optimistic send the backend refused: drop its pending entry (so a reload
// won't resurrect it) and remove its echo bubble.
function rollbackSend(created, time){
  if(pending[created]){
    pending[created] = pending[created].filter(p => p.time !== time);
    if(!pending[created].length) delete pending[created];
    savePending();
  }
  if(logs[created]){
    const i = logs[created].findIndex(e => e.cls === "user" && e.unix === time);
    if(i !== -1){
      logs[created].splice(i, 1);
      // Removing an entry before the read mark shifts it — keep it on the same item,
      // else a later background message wouldn't count as unread.
      if(readMark[created] !== undefined && i < readMark[created]) readMark[created]--;
      if(viewing(created)) renderLog(); else renderTabs();
    }
  }
}

function abortActive(){
  if(!active) return;
  const target = active;
  api("/api/abort", { method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ session: target }) })
    .then(r => {
      // Abort drops the queue server-side; those queued UI sends will never reach a
      // transcript turn, so clear their pending echoes to avoid reload ghosts. The
      // running turn's user message is already in the transcript, so it survives.
      if(r.ok && pending[target]){ delete pending[target]; savePending(); }
    });
}

function newSession(){
  api("/api/new", { method:"POST" }).then(r => r.json()).then(d => {
    if(d.created){ selectTab(d.created); openSettings(d.created, "Новая сессия", true); }
  })
    .catch(() => showNotice("не удалось создать сессию"));
}

// --- Per-session settings dialog (double-click a tab) ---
function ctxClass(pct){ return pct >= 90 ? "crit" : pct >= 70 ? "hot" : ""; }

function fetchSettings(created){
  return api("/api/settings?session="+created).then(r => r.ok ? r.json() : Promise.reject(r));
}

function openSettings(created, title, isNew){
  settingsFor = created;
  settingsIsNew = !!isNew;
  document.querySelector(".smodal-title").textContent = title || "Настройки сессии";
  document.getElementById("smodal").classList.remove("hidden");
  document.getElementById("sbody").innerHTML = '<div class="shint">Загрузка…</div>';
  fetchSettings(created).then(d => { if(settingsFor === created) renderSettings(d); })
    .catch(() => { if(settingsFor === created) document.getElementById("sbody").innerHTML = '<div class="shint">Не удалось загрузить настройки</div>'; });
}

function closeSettings(){ settingsFor = 0; settingsIsNew = false; document.getElementById("smodal").classList.add("hidden"); }

function renderSettings(d){
  if(settingsFor !== d.created) return;
  const opts = (list, cur, withDefault) => {
    let h = withDefault ? '<option value=""'+(cur===""?" selected":"")+'>По умолчанию</option>' : "";
    list.forEach(o => { h += '<option value="'+esc(o.value)+'"'+(o.value===cur?" selected":"")+'>'+esc(o.label)+'</option>'; });
    return h;
  };
  const lock = d.busy, dis = lock ? " disabled" : "";
  let h = "";
  if(lock) h += '<div class="sbusy">⏳ Сессия занята — параметры запуска нельзя менять до завершения.</div>';
  h += '<div class="srow"><label>Имя</label><div class="sctl"><input class="sname" type="text" maxlength="80" value="'+esc(d.name)+'"></div></div>';
  h += '<div class="srow"><label>Движок</label><div class="sctl"><select id="s-backend"'+((d.backend_locked||lock)?" disabled":"")+'>'+opts(d.backends, d.backend, false)+'</select></div></div>';
  if(d.backend_locked) h += '<div class="shint">Движок зафиксирован после первого сообщения.</div>';
  h += '<div class="srow"><label>Модель</label><div class="sctl"><select id="s-model"'+dis+'>'+opts(d.models, d.model, true)+'</select></div></div>';
  h += '<div class="srow"><label>Мышление</label><div class="sctl"><select id="s-think"'+dis+'>'+opts(d.efforts, d.think, true)+'</select></div></div>';
  h += '<div class="srow"><label>Sandbox</label><div class="sctl"><label class="stoggle"><input type="checkbox" id="s-sandbox"'+(d.sandbox==="on"?" checked":"")+dis+'><span>'+(d.sandbox==="on"?"вкл":"выкл")+'</span></label></div></div>';
  if(d.tty_available)
    h += '<div class="srow"><label>TTY</label><div class="sctl"><label class="stoggle"><input type="checkbox" id="s-tty"'+(d.tty?" checked":"")+dis+'><span>'+(d.tty?"вкл":"выкл")+'</span></label></div></div>';
  h += '<div class="sfield"><label>Рабочий каталог</label><input class="scwd" type="text"'+dis+' value="'+esc(d.cwd||"")+'"></div>';
  h += '<div class="sfield"><label>Системный промпт</label><textarea class="sprompt" rows="2"'+dis+' placeholder="добавляется к системному промпту">'+esc(d.prompt||"")+'</textarea></div>';
  h += '<div class="ssep"></div>';
  if(d.ctx_window > 0){
    const pct = Math.min(100, Math.round(d.ctx_used*100/d.ctx_window));
    h += '<div class="sctx-label"><span>Контекст</span><span>'+Math.round(d.ctx_used/1000)+'k / '+Math.round(d.ctx_window/1000)+'k · '+pct+'%</span></div>'
       + '<div class="sctx-bar"><div class="sctx-fill '+ctxClass(pct)+'" style="width:'+pct+'%"></div></div>';
  } else {
    h += '<div class="sctx-label"><span>Контекст</span><span>—</span></div>';
  }
  h += '<div class="shint" style="margin-top:8px">💬 Сообщений: '+(d.messages||0)+'</div>';
  const b = document.getElementById("sbody");
  b.innerHTML = h;

  const nameInput = b.querySelector(".sname");
  const applyName = () => { const v = nameInput.value.trim(); if(v && v !== d.name) patchSettings(d.created, { name: v }); };
  nameInput.addEventListener("keydown", e => {
    if(e.key !== "Enter") return;
    e.preventDefault();
    nameInput.blur(); // commit the name via the blur handler
    // A freshly-created session: the dialog is "name it and go", so Enter closes
    // it. An existing session keeps the old behaviour (commit, stay open) so
    // several fields can be edited in one pass.
    if(settingsIsNew) closeSettings();
  });
  nameInput.addEventListener("blur", applyName);
  // On creation, drop the cursor straight into the name field (and preselect the
  // placeholder) so the user can type a name and press Enter without the mouse.
  if(settingsIsNew && settingsFor === d.created){ nameInput.focus(); nameInput.select(); }
  const wire = (sel, fn) => { const el = b.querySelector(sel); if(el) el.onchange = fn; };
  wire("#s-backend", e => patchSettings(d.created, { backend: e.target.value }));
  wire("#s-model",   e => patchSettings(d.created, { model: e.target.value }));
  wire("#s-think",   e => patchSettings(d.created, { think: e.target.value }));
  wire("#s-sandbox", e => patchSettings(d.created, { sandbox: e.target.checked ? "on" : "off" }));
  wire("#s-tty",     e => patchSettings(d.created, { tty: e.target.checked }));
  const cwd = b.querySelector(".scwd");
  if(cwd){
    const applyCwd = () => { const v = cwd.value.trim(); if(v && v !== d.cwd) patchSettings(d.created, { cwd: v }); };
    cwd.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); cwd.blur(); } });
    cwd.addEventListener("blur", applyCwd);
  }
  const prompt = b.querySelector(".sprompt");
  if(prompt) prompt.addEventListener("blur", () => { const v = prompt.value.trim(); if(v !== (d.prompt||"")) patchSettings(d.created, { prompt: v }); });
}

function patchSettings(created, patch){
  patch.session = created;
  api("/api/settings", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(patch) })
    .then(r => {
      if(r.ok) return r.json();
      r.text().then(t => showNotice(t.trim() || "не удалось применить"));
      return fetchSettings(created); // re-sync controls to the true state
    })
    .then(d => { if(d && settingsFor === created) renderSettings(d); })
    .catch(() => showNotice("не удалось применить"));
}

// Refresh an open dialog when its session's run state flips (busy locks/unlocks
// the controls and ctx updates) — but never while the user is editing the name.
function maybeRefreshSettings(created){
  if(settingsFor !== created) return;
  const ae = document.activeElement, body = document.getElementById("sbody");
  // Don't yank a field out from under the user mid-edit (name/cwd/prompt).
  if(ae && body && body.contains(ae) && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA")) return;
  fetchSettings(created).then(d => { if(settingsFor === created) renderSettings(d); }).catch(()=>{});
}

function closeSession(created, name){
  uiConfirm("Закрыть сессию «"+(name||("#"+created))+"»?", "Закрыть", true).then(ok => {
    if(!ok) return;
    api("/api/close", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ session: created }) })
      .then(r => {
        if(!r.ok){ r.text().then(t => showNotice(t.trim() || "не удалось закрыть")); return; }
        // Drop all per-session client state so a later session reusing this
        // (second-granular) created id can't inherit stale logs/readMark/pending.
        delete logs[created]; delete loaded[created]; delete offset[created];
        delete readMark[created]; delete pending[created]; busy.delete(created);
        savePending();
      });
  });
}

function start(){
  document.getElementById("gate").classList.add("hidden");
  document.getElementById("app").classList.add("active");
  syncSessionsNow(); // initial state: picks the active tab (reconcile) + loads its transcript
  pollLoop();        // begin long-polling; the first poll establishes the cursor
}

// Returning to a backgrounded tab: timers were throttled, so reconcile state now
// (a turn may have started/finished while hidden) and refresh the view.
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible"){
    syncSessionsNow();
    renderTabs();
    if(active && tabStick[active] && hasUnread(active)) jumpUnreadOnRender = active;
    if(active) renderLog();
  } else if(active){
    tabStick[active] = stick || nearBottom();
    readMark[active] = (logs[active] || []).length;
    renderTabs();
  }
});

document.getElementById("input").addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});
document.getElementById("input").addEventListener("input", autoGrow);
document.getElementById("token").addEventListener("keydown", e => {
  if(e.key === "Enter"){ e.preventDefault(); saveToken(); }
});
document.getElementById("log").addEventListener("scroll", () => {
  stick = nearBottom(); toggleToBottom();
});
// Click-to-copy on code blocks — event-delegated so it survives log re-renders.
document.getElementById("log").addEventListener("click", (e) => {
  const btn = e.target.closest(".copy");
  if(!btn) return;
  const pre = btn.closest("pre"), code = pre && pre.querySelector("code");
  if(!code) return;
  copyText(code.textContent).then(ok => {
    if(!ok) return;
    const prev = btn.textContent;
    btn.textContent = "✓"; btn.classList.add("done");
    setTimeout(() => { btn.textContent = prev; btn.classList.remove("done"); }, 1200);
  });
});
// Flush a render that was deferred because the user was selecting text in the log.
document.addEventListener("selectionchange", () => {
  if(pendingRender && !selectionInLog()){ pendingRender = false; renderLog(); }
});
window.addEventListener("hashchange", () => {
  const want = parseInt(location.hash.slice(1));
  if(want && want !== active && sessions.find(s=>s.created===want)) selectTab(want);
});
document.getElementById("smodal").addEventListener("click", e => { if(e.target.id === "smodal") closeSettings(); });
document.addEventListener("keydown", e => { if(e.key === "Escape" && settingsFor) closeSettings(); });

if(token) start();
</script>
